name: Prod CI/CD Pipeline
on:
  pull_request:
    types: [labeled]
    branches: [prod]
  push:
    branches: [prod]

permissions:
  pull-requests: write
  contents: write
  id-token: write

jobs:
  auto-merge-approval:
    if: github.event_name == 'pull_request' && github.event.label.name == 'approval'
    runs-on: prod
    outputs:
      merged: ${{ steps.check-merge.outputs.merged }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Merge PR with approval label
        id: check-merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
          echo "merged=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-deploy:
    if: needs.auto-merge-approval.outputs.merged == 'true'
    needs: auto-merge-approval
    runs-on: prod
    env:
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
      IMAGE_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/product/prod
      CACHE_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com/cache:cache
    steps:
      - name: Checkout code (prod)
        uses: actions/checkout@v4
        with:
          ref: prod
          sparse-checkout: |
            Dockerfile
            app.py
            requirements.txt
            .dockerignore
            values/prod.values.yaml
          sparse-checkout-cone-mode: false
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-role
          aws-region: eu-central-1
          role-duration-seconds: 1200
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v1
      - name: Setup Buildx and QEMU
        run: |
          if ! docker buildx inspect mybuilder 2>/dev/null; then
            docker buildx create --name mybuilder --driver docker-container --use
            docker buildx inspect --bootstrap
          fi
          docker run --privileged --rm tonistiigi/binfmt --install all
      - name: Multi-Arch Build & Push with ECR Cache (OCI Index)
        run: |
          docker buildx use mybuilder
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag $IMAGE_URI:${{ github.sha }} \
            --push \
            --cache-to type=registry,ref=$CACHE_IMAGE,mode=max \
            --cache-from type=registry,ref=$CACHE_IMAGE \
            --output type=registry,oci-mediatypes=true \
            .
      - name: Update prod.values.yaml with new image tag
        run: |
          sed -i "s|tag: .*|tag: '${{ github.sha }}'|" values/prod.values.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add values/prod.values.yaml
          git commit -m "chore: bump prod image tag to ${{ github.sha }}" || echo "No changes to commit"
          git pull --rebase origin prod || true
          git push origin prod
      - name: Trigger ArgoCD Sync (Prod)
        run: |
          echo y | argocd login $ARGOCD_SERVER \
            --username admin \
            --password "Skill53##" \
            --insecure
          argocd app sync prod

  fast-forward-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: dev
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
      - name: Fast-forward dev to prod
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin prod
          git merge --ff-only origin/prod
          git push origin dev
